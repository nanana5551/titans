<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Личный кабинет - Титаны</title>
  <link rel="stylesheet" href="../style/account.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="../images/1.png" alt="FC Titans">
      <h1 class="club-name"><a href="../index.html">Титаны</a></h1>
  </div>
  
    <nav>
      <ul>
        <li><a href="../index.html">Главная</a></li>
        <li><a href="../pages/club.html">Клуб</a></li>
        <li><a href="../pages/team.html">Команда</a></li>
        <li><a href="../pages/tamaev.html">Матчи</a></li>
        <li><a href="../pages/news.html">Новости</a></li>
        <li><a href="shop.html" class="active">Магазин</a></li>
        <li><a href="../pages/table.html">Таблица РПЛ</a></li>
      </ul>
    </nav>
  
    <div class="header-actions">
      <a href="../pages/shop.html">
      <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div></a>
      <a href="account.html" class="avatar-link">
        <img src="../images/user-interface.png" alt="Личный кабинет" class="avatar" />
      </a>
    </div>
  </header>

  <main class="account-page">
    <section class="account-hero">
      <h2>Личный кабинет</h2>
    </section>

    <section class="account-container">
      <div class="account-card profile-card" id="userInfo">
        <div class="section-heading">
          <h3>Профиль</h3>
        </div>
        <form id="profileForm">
          <label>Имя
            <input type="text" id="username" />
          </label>
          <label>Email
            <input type="email" id="email" />
          </label>
          <button type="submit">Сохранить</button>
        </form>
      </div>

      <div class="account-card orders-card">
        <div class="section-heading">
          <h3>История заказов</h3>
        </div>
        <div id="orderHistory"></div>
        <div class="account-actions">
          <button id="clearHistory" class="secondary-btn">Очистить историю</button>
          <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-partners">
      <h3>ПАРТНЕРЫ</h3>
      <div class="footer-partner-logos">
        <a href="https://www.championat.com/"><img src="../images/chempionatt.webp" alt="championat"></a>
        <a href="https://www.sports.ru/"><img src="../images/sports.webp" alt="sports"></a>
        <a href="https://railfgk.ru/"><img src="../images/fedgruzkomp.webp" alt="fedgruzkomp"></a>
        <a href="https://www.sogaz.ru/"><img src="../images/cogaz.webp" alt="sogaz"></a>
      </div>
    </div>

    <div class="footer-socials">
      <a href="https://vk.com/feed"><img src="../images/vk.png" alt="VK"></a>
      <a href="https://web.telegram.org/"><img src="../images/telegram.png" alt="telegram"></a>
      <a href="https://www.youtube.com/"><img src="../images/youtube (1).png" alt="youtube"></a>
    </div>

    <div class="footer-legal">
      <p>© ФК Титаны - 2026</p>
    </div>
  </footer>
  

  <script src="./account.js"></script>
</body>
</html>
